<!DOCTYPE html>
<html>
<head>
    <title>College Registration Form</title>
</head>

<body style="background-color:#f0f8ff; font-family:Arial;">

    <div style="
        width:400px;
        margin:auto;
        background-color:white;
        padding:20px;
        border-radius:10px;
        border:2px solid blue;
    ">

        <h1 style="
            text-align:center;
            color:darkblue;
        ">
            College Registration Form
        </h1>

        <form>

            <label>Full Name:</label><br>
            <input type="text"
            placeholder="Enter your name"
            style="width:100%; padding:8px;"><br><br>

            <label>Email:</label><br>
            <input type="email"
            placeholder="Enter your email"
            style="width:100%; padding:8px;"><br><br>

            <label>Password:</label><br>
            <input type="password"
            placeholder="Enter password"
            style="width:100%; padding:8px;"><br><br>

            <label>Gender:</label><br>

            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Other
            <br><br>

            <label>Courses Known:</label><br>

            <input type="checkbox"> Python <br>
            <input type="checkbox"> C Programming <br>
            <input type="checkbox"> Java <br><br>

            <label>Select Branch:</label><br>

            <select style="width:100%; padding:8px;">
                <option>CSE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>MECH</option>
            </select><br><br>

            <label>Intermediate Marks:</label><br>

            <input type="number"
            placeholder="Enter Inter Marks"
            style="width:100%; padding:8px;"><br><br>

            <label>Address:</label><br>

            <textarea rows="4"
            style="width:100%; padding:8px;"></textarea><br><br>

            <button type="submit"
            style="
                width:100%;
                background-color:blue;
                color:white;
                padding:10px;
                border:none;
                border-radius:5px;
                font-size:16px;
            ">
                Register
            </button>

        </form>

    </div>

</body>
</html>
